name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        container:
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:bookworm
          - fedora:42
          - alpine:3.21

    steps:
      - uses: actions/checkout@v4

      - name: Install bash (Alpine only)
        if: ${{ startsWith(matrix.container, 'alpine') }}
        run: apk add --no-cache bash

      - name: Run tests
        run: bash test/run-all.sh
