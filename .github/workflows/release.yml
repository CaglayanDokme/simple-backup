name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from changelog
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          changelog="docs/changelog.md"

          # Find the header line for this version (e.g., "## v0.2.0 - April 24, 2026")
          header_pattern="^## ${tag} -"
          start_line="$(grep -n "${header_pattern}" "${changelog}" | head -n1 | cut -d: -f1)" || true

          if [[ -z "${start_line}" ]]; then
            echo "::error::Changelog entry not found for ${tag}. Expected a header matching '## ${tag} - <date>' in ${changelog}."
            exit 1
          fi

          # Find the next section header after start_line (or use EOF)
          total_lines="$(wc -l < "${changelog}")"
          end_line="$(tail -n +"$((start_line + 1))" "${changelog}" | grep -n '^## ' | head -n1 | cut -d: -f1)" || true

          if [[ -n "${end_line}" ]]; then
            # end_line is relative to start_line+1, convert to absolute and exclude the next header
            end_line="$((start_line + end_line - 1))"
          else
            end_line="${total_lines}"
          fi

          # Extract the section (skip the header line itself, include body only)
          body="$(sed -n "$((start_line + 1)),${end_line}p" "${changelog}" | sed -e '/./,$!d' -e :a -e '/^\n*$/{$d;N;ba;}')"

          # Write to file for the release action
          printf '%s\n' "${body}" > release-notes.md

          echo "Release notes for ${tag}:"
          cat release-notes.md

      - name: Build release artifact
        run: |
          sed "s/@@VERSION@@/${GITHUB_REF_NAME}/g" src/backup.sh > bkp
          chmod +x bkp

          # Verify the version was embedded correctly
          embedded="$(bash bkp --version)"
          if [[ "${embedded}" != "${GITHUB_REF_NAME}" ]]; then
            echo "::error::Version mismatch: expected '${GITHUB_REF_NAME}', got '${embedded}'."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: bkp
